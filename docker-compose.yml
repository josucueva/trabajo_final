services:
  graphdb:
    image: ontotext/graphdb:10.7.0
    container_name: videojuegos-graphdb
    ports:
      - "7200:7200"
      - "7300:7300"
    environment:
      GDB_JAVA_OPTS: >-
        -Xmx4g
        -Xms1g
      GDB_HEAP_SIZE: 4g
    volumes:
      - graphdb-data:/opt/graphdb/home/data
      - ./ontology:/opt/graphdb/import/ontology
      - ./output:/opt/graphdb/import/output
    restart: unless-stopped

  ontotext-refine:
    image: ontotext/refine:latest
    container_name: videojuegos-ontotext-refine
    ports:
      - "7333:7333"
    volumes:
      - ./data:/data
      - ./output:/output
      - ./ontology:/ontology
    environment:
      - REFINE_MEMORY=4G
    restart: unless-stopped
    depends_on:
      - graphdb

volumes:
  graphdb-data:
